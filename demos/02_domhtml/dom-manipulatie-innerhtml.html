<!DOCTYPE html>
<html lang="en">

<head>
  <title>Testpagina</title>
  <meta charset="utf-8">
  <style>
     body {
        font-family: sans-serif;
        font-size: 0.8em;
     }
  </style>
</head>

<body>
  <div id="gallery"></div>
  <p id="message"></p>
  <script>
      const gallery = document.querySelector('#gallery');
      const msg = document.querySelector('#message');
      const urls = [
         'https://rvdl.be/img/photo1-s.jpg',
         'https://rvdl.be/img/photo2-s.jpg',
         'https://rvdl.be/img/photo3-s.jpg',
         'https://rvdl.be/img/photo4-s.jpg'
      ];
      for (let i = 0; i < urls.length; i++) {
         gallery.innerHTML += `<img id="photo-${i + 1}" src="${urls[i]}" alt=""><br>`;
      };
      const numImages = gallery.querySelectorAll('img').length;
      msg.textContent = `gallery contains ${numImages} images`;
      //msg.innerHTML = `gallery contains <strong>${numImages} images<strong>`;
  </script>
</body>

</html>
